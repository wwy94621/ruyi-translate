<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ruyi Translate 设置</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-card">
        <p class="eyebrow">Ruyi Translate</p>
        <h1>网页正文翻译设置</h1>
        <p class="hero-copy">
          这个扩展会按视口识别网页核心内容，并以原文和译文对照的方式插入页面。首版采用启发式规则识别正文，并通过流式响应逐段回填译文。
        </p>
      </section>

      <section class="form-card">
        <form id="settings-form" class="settings-form">
          <label class="field">
            <span class="field-label">API URL</span>
            <input id="endpointUrl" name="endpointUrl" type="url" placeholder="https://api.openai.com/v1/chat/completions" required />
          </label>

          <label class="field">
            <span class="field-label">API Key</span>
            <input id="apiKey" name="apiKey" type="password" placeholder="sk-..." />
          </label>

          <label class="field">
            <span class="field-label">Model</span>
            <input id="model" name="model" type="text" placeholder="gpt-4.1-mini" required />
          </label>

          <div class="field-grid">
            <label class="field">
              <span class="field-label">目标语言</span>
              <input id="targetLanguage" name="targetLanguage" type="text" placeholder="简体中文" required />
            </label>

            <label class="field">
              <span class="field-label">请求超时（毫秒）</span>
              <input id="requestTimeoutMs" name="requestTimeoutMs" type="number" min="5000" step="1000" required />
            </label>
          </div>

          <div class="field-grid">
            <label class="field">
              <span class="field-label">单批最大字符数</span>
              <input id="maxBatchChars" name="maxBatchChars" type="number" min="400" step="100" required />
            </label>

            <label class="toggle-field">
              <span class="field-label">调试模式</span>
              <input id="debug" name="debug" type="checkbox" />
              <span class="toggle-copy">输出更多调试信息到页面控制台，包括候选文本为什么被跳过，便于后续调参</span>
            </label>
          </div>

          <div class="actions-row">
            <button class="primary-button" type="submit">保存设置</button>
            <p id="save-status" class="save-status" aria-live="polite"></p>
          </div>
        </form>
      </section>
    </main>

    <script type="module" src="./options.js"></script>
  </body>
</html>
